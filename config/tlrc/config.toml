[cache]
auto_update = true
defer_auto_update = false

[output]
show_title = true
platform_title = false
show_hyphens = false
edit_link = false
example_prefix = "  "
line_length = 100
compact = false
option_style = "long"
raw_markdown = false

[style.title]
color = "bright_blue"
bold = true

[style.description]
color = "cyan"

[style.bullet]
color = "bright_blue"

[style.example]
color = "white"

[style.url]
color = "bright_cyan"
underline = true

[style.inline_code]
color = "bright_blue"

[style.placeholder]
color = "yellow"
italic = true
