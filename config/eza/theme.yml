    foreground: Yellow
  build:
    foreground: Yellow
    is_underline: true
  source:
    foreground: BrightBlue

date:
  foreground: BrightBlack

header:
  foreground: BrightBlue
  is_bold: true

size:
  major:
    foreground: Blue
  minor:
    foreground: Cyan
  number_byte:
    foreground: White
  number_kilo:
    foreground: White
  number_mega:
    foreground: BrightBlue
  number_giga:
    foreground: Cyan
  number_huge:
    foreground: Magenta
  unit_byte:
    foreground: BrightBlack
  unit_kilo:
    foreground: BrightBlack
  unit_mega:
    foreground: BrightBlack
  unit_giga:
    foreground: BrightBlack
  unit_huge:
    foreground: BrightBlack
