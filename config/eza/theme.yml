users:
  user_you:
    foreground: Blue
    is_bold: true
  user_root:
    foreground: Red
  user_other:
    foreground: White
  group_yours:
    foreground: Cyan
  group_other:
    foreground: BrightBlue
  group_root:
    foreground: Red

filekinds:
  normal:
    foreground: White
  directory:
    foreground: Blue
    is_bold: true
  symlink:
    foreground: Cyan
  executable:
    foreground: BrightBlue
    is_bold: true
  mount_point:
    foreground: BrightBlue
    is_bold: true

git:
  new:
    foreground: Cyan
  modified:
    foreground: Blue
  deleted:
    foreground: Red
  renamed:
    foreground: BrightBlue
  ignored:
    foreground: BrightBlack
  conflicted:
    foreground: Yellow
    is_bold: true

git_repo:
  branch_main:
    foreground: Blue
    is_bold: true
  branch_other:
    foreground: Cyan
  git_clean:
    foreground: Green
  git_dirty:
    foreground: Yellow

file_type:
  image:
    foreground: Magenta
  video:
    foreground: BrightMagenta
  music:
    foreground: Cyan
  crypto:
    foreground: Green
  document:
    foreground: BrightBlue
  compressed:
    foreground: Red
  temp:
    foreground: BrightBlack
