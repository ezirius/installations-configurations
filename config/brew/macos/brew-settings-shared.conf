BREW_CONFIGURE_STEPS=(
  "caddy-configure"
  "caddy-trust"
  "podman-configure"
  "system-configure"
)
BREW_BOOTSTRAP_STEPS=(
  "brew-install"
  "brew-upgrade"
  "brew-configure"
)
BREW_BOOTSTRAP_SERVICE_ACTION="start"
BREW_MANAGED_SERVICE_SCRIPTS=(
  "caddy-service"
)
BREW_INSTALL_REQUIRE_COMMITTED_REPO=true
BREW_INSTALL_TRIGGER_CLT_INSTALLER_IF_MISSING=true
