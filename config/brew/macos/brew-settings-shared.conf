BREW_INSTALL_HOMEBREW_MANUAL_INSTALL_REASON="This repository does not execute the upstream Homebrew installer automatically because the published install path is a moving script without an official SHA-256 verification artefact for this workflow. Install Homebrew manually, then re-run this script."
